  <!-- Fonts from the Vanilla App -->

  <!-- Vanilla App Styles (for Header only, embedded to avoid body reset conflicts) -->
  <style>
    :root {
      --bg-color: #0d0d0d;
      --text-color: #ffffff;
      --accent-color: #555555;
      --font-display: 'Inter Tight', sans-serif;
    }
    
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 2.5rem 3rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      z-index: 9999 !important;
      pointer-events: none;
    }
    
    .header__logo {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-color);
      text-decoration: none;
      pointer-events: auto;
      visibility: hidden; /* Hidden on home page to avoid overlap with giant SVG logo */
    }
    
    .header__nav {
      display: flex;
      gap: 3rem;
      pointer-events: auto;
      justify-self: center;
    }
    
    .header__link {
      font-family: var(--font-display);
      color: var(--accent-color);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      transition: color 0.3s ease, transform 0.3s ease;
    }
    
    .header__link:hover, .header__link.active {
      color: var(--text-color);
    }
    
    /* Ensure React takes full space */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background-color: white; /* Default for the React app */
    }
    
    /* Overwrite specific Tailwind resets if needed, but Tailwind should handle it */
